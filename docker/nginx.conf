worker_processes 1;
events { worker_connections 1024; }

http {
  # Usa o DNS interno do Docker para re-resolver nomes de containers em runtime.
  resolver 127.0.0.11 valid=10s ipv6=off;
  client_max_body_size 100m;

  server {
    listen 80;
    server_name _;

    # API interna do Docker
    location /api/ {
      set                $api_upstream http://api:3001;
      proxy_pass         $api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }

    # Frontend interno do Docker
    location / {
      set                $web_upstream http://web:3000;
      proxy_pass         $web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }
  }
}
