version: '3.9'

services:
  # ── Banco de Dados ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: transrota_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transrota_master
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: transrota_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Nginx Reverse Proxy (porta 80) ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: transrota_nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  # ── MinIO (Storage S3-compatible) ────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: transrota_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  # ── API NestJS ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: transrota_api
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      DATABASE_MASTER_URL: postgresql://postgres:postgres@postgres:5432/transrota_master?schema=public
      DATABASE_BASE_URL: postgresql://postgres:postgres@postgres:5432/transrota
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-refresh-in-production}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: transrota
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend Next.js ─────────────────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: transrota_web
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
